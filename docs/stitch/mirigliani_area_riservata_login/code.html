<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #FAF9F6;
        }
        .editorial-shadow {
            box-shadow: 0 12px 32px rgba(26, 43, 74, 0.06), 0 2px 8px rgba(26, 43, 74, 0.04);
        }

<body class="font-body text-on-surface flex flex-col min-h-screen">

    <!-- Top Navigation suppressed for Login context as per Shell Visibility Rule -->
    <header class="fixed top-0 w-full z-50 flex justify-center items-center px-12 py-8 bg-[#FAF9F6]/80 backdrop-blur-xl">
        <div class="text-2xl font-medium text-primary tracking-widest uppercase">
            Mirigliani
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-6 pt-24 pb-32 relative overflow-hidden">
        <!-- Background decorative element representing high-end marble texture -->
        <div class="absolute inset-0 z-0 opacity-10 pointer-events-none">
            <div class="absolute top-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full blur-[120px] bg-primary/20"></div>
            <div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full blur-[100px] bg-tertiary-fixed-dim/30"></div>
        </div>

        <div class="w-full max-w-md z-10">
            <!-- Login Card -->
            <div class="bg-surface-container-lowest editorial-shadow overflow-hidden border border-outline-variant/15 p-10 md:p-12">
                
                <div class="text-center mb-10">
                    <h1 class="font-headline text-4xl italic tracking-tight text-primary mb-2">Area Riservata</h1>
                    <p class="text-xs font-label uppercase tracking-[0.2em] text-on-surface-variant/60">Accesso Editoriale</p>
                </div>

                <form class="space-y-8">
                    <!-- Email Field -->
                    <div class="space-y-2">
                        <label for="email" class="text-[10px] font-bold uppercase tracking-[0.15em] text-primary/70 ml-1">Email</label>
                        <div class="relative group">
                            <input type="email" id="email" name="email" required
                                class="w-full bg-surface-container-low border-0 border-b border-outline-variant focus:ring-0 focus:border-tertiary-fixed-dim transition-all duration-300 py-3 px-4 text-on-surface placeholder-outline-variant/50"
                                placeholder="nome@azienda.it">
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="space-y-2">
                        <div class="flex justify-between items-end">
                            <label for="password" class="text-[10px] font-bold uppercase tracking-[0.15em] text-primary/70 ml-1">Password</label>
                            <a href="#" class="text-[10px] font-bold uppercase tracking-widest text-primary/40 hover:text-primary transition-colors duration-300">
                                Password dimenticata?
                            </a>
                        </div>
                        <div class="relative group">
                            <input type="password" id="password" name="password" required
                                class="w-full bg-surface-container-low border-0 border-b border-outline-variant focus:ring-0 focus:border-tertiary-fixed-dim transition-all duration-300 py-3 px-4 text-on-surface"
                                placeholder="••••••••">
                        </div>
                    </div>

                    <!-- Action Button -->
                    <div class="pt-4">
                        <button type="submit" 
                            class="w-full bg-primary text-on-primary py-4 px-6 rounded-lg font-label text-sm font-bold uppercase tracking-[0.2em] hover:bg-primary-container transition-all duration-300 active:scale-[0.98] flex items-center justify-center gap-3 group">
                            Accedi
                            <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_right_alt</span>
                        </button>
                    </div>
                </form>

                <div class="mt-12 text-center">
                    <div class="flex items-center justify-center gap-2 mb-4">
                        <span class="h-[1px] w-8 bg-outline-variant/30"></span>
                        <span class="text-[9px] font-mono text-outline-variant uppercase tracking-widest">Authorized Entry Only</span>
                        <span class="h-[1px] w-8 bg-outline-variant/30"></span>
                    </div>
                </div>
            </div>

            <!-- Footer Note -->
            <div class="mt-8 text-center space-y-4">
                <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-primary/50">
                    Area riservata a clienti e collaboratori Mirigliani
                </p>
                <div class="flex justify-center gap-6">
                    <span class="material-symbols-outlined text-primary/20 text-sm">verified_user</span>
                    <span class="material-symbols-outlined text-primary/20 text-sm">lock</span>
                    <span class="material-symbols-outlined text-primary/20 text-sm">shield</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Shared Footer Component -->
    <footer class="fixed bottom-0 w-full flex flex-col items-center gap-4 pb-12 text-center">
        <div class="flex gap-8">
            <a href="#" class="font-label text-[10px] uppercase tracking-[0.2em] font-bold text-primary/40 hover:text-primary transition-opacity opacity-80 hover:opacity-100">Terms of Service</a>
            <a href="#" class="font-label text-[10px] uppercase tracking-[0.2em] font-bold text-primary/40 hover:text-primary transition-opacity opacity-80 hover:opacity-100">Privacy Protocol</a>
            <a href="#" class="font-label text-[10px] uppercase tracking-[0.2em] font-bold text-primary/40 hover:text-primary transition-opacity opacity-80 hover:opacity-100">Support</a>
        </div>
        <p class="font-label text-[10px] uppercase tracking-[0.2em] font-bold text-primary/40">
            © 2024 Mirigliani Editorial. Authorized access only.
        </p>
    </footer>

    <!-- Decorative Image Layer (Editorial Background) -->
    <div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
        <img src="image-placeholder.jpg" 
             data-alt="Close-up of elegant white marble texture with subtle grey veining and soft cinematic lighting reflecting off a polished surface"
             class="absolute inset-0 w-full h-full object-cover opacity-[0.03] mix-blend-multiply">
    </div>

</body>
